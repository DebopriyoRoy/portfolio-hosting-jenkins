apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: k8s-deployment
  template:
    metadata:
      labels:
        app: k8s-deployment
    spec:
      containers:
      - name: portfolio-website
        image: debopriyoroy/portfolio-hosting:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-deployment
spec:
  type: NodePort
  selector:
    app: k8s-deployment
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30081
